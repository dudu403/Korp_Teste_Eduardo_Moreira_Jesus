<aside class="w-[250px] min-h-screen bg-[#0b1733] text-white flex flex-col justify-between">
  <div>
    <div class="px-6 py-8 border-b border-white/10">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center text-lg">📄</div>
        <div>
          <h1 class="text-2xl font-bold leading-none">KORP</h1>
          <p class="text-xs tracking-[0.2em] text-slate-300 mt-2">NF-E SYSTEM</p>
        </div>
      </div>
    </div>

    <div class="px-3 py-6">
      <p class="text-[11px] uppercase text-slate-400 mb-4 tracking-[0.2em] px-3">Menu Principal</p>

      <nav class="space-y-2">
        <a
          routerLink="/"
          routerLinkActive="bg-blue-600 text-white shadow-lg"
          [routerLinkActiveOptions]="{ exact: true }"
          class="flex items-center gap-3 px-4 py-3 rounded-2xl text-slate-200 hover:bg-white/10 transition"
        >
          <span>📊</span>
          <span class="font-medium">Dashboard</span>
        </a>

        <a
          routerLink="/produtos"
          routerLinkActive="bg-blue-600 text-white shadow-lg"
          class="flex items-center gap-3 px-4 py-3 rounded-2xl text-slate-200 hover:bg-white/10 transition"
        >
          <span>📦</span>
          <span class="font-medium">Produtos</span>
        </a>

        <a
          routerLink="/notas-fiscais"
          routerLinkActive="bg-blue-600 text-white shadow-lg"
          class="flex items-center gap-3 px-4 py-3 rounded-2xl text-slate-200 hover:bg-white/10 transition"
        >
          <span>📄</span>
          <span class="font-medium">Notas Fiscais</span>
        </a>
      </nav>
    </div>
  </div>

  <div class="px-3 py-6 border-t border-white/10">
    <div class="space-y-2">
      <button class="w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-slate-200 hover:bg-white/10 transition">
        <span>⚙️</span>
        <span class="font-medium">Configurações</span>
      </button>
      <button class="w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-slate-200 hover:bg-white/10 transition">
        <span>🚪</span>
        <span class="font-medium">Sair</span>
      </button>
    </div>
  </div>
</aside>
